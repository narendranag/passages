# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = "passages"
primary_region = "sjc"

[build]

[env]
  DATABASE_URL = "sqlite:///data/passages.db"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "passages_data"
  destination = "/data"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
